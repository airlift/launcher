name: ci

on:
  - push
  - pull_request

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-java@v5.4.0
        with:
          distribution: 'temurin'
          java-version: 24
      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: 'src/main/go/go.mod'
          cache: false
      - name: Maven Install
        run: ./mvnw install -B -V -DskipTests -Dair.check.skip-all
      - name: Maven Tests
        run: ./mvnw install -B -P ci
